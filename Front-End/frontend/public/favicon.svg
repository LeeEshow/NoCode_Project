<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Circle ring -->
  <circle cx="50" cy="50" r="41" stroke="#8B6914" stroke-width="5"/>

  <!-- Rotated 45° group: arrow shaft (= $ vertical bar) + arrowhead + S-curves -->
  <g transform="rotate(45, 50, 50)">
    <!-- Arrow shaft / dollar vertical bar -->
    <line x1="50" y1="90" x2="50" y2="8"
          stroke="#8B6914" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Arrowhead wings at top -->
    <line x1="50" y1="8" x2="40" y2="8"
          stroke="#8B6914" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="50" y1="8" x2="50" y2="18"
          stroke="#8B6914" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Dollar sign S-body -->
    <path d="M 63 38 C 63 24 37 24 37 38 C 37 47 63 50 63 59 C 63 73 37 73 37 59"
          stroke="#8B6914" stroke-width="4.5" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
