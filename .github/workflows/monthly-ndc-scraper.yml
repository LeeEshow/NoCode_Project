name: Monthly NDC Scraper

on:
  schedule:
    - cron: '0 22 * * 0'  # 每週日 UTC 22:00 = 台灣時間週一 06:00
  workflow_dispatch:       # 也可手動觸發

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests firebase-admin

      - name: Run NDC scraper
        env:
          FIREBASE_SA_BASE64: ${{ secrets.FIREBASE_SA_BASE64 }}
        run: python azure-functions/run_scraper.py
