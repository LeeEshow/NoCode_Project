name: Deploy Python Backend

on:
  push:
    branches: [main]
    paths:
      - 'Back-End/python-backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies into .python_packages
        run: |
          pip install -r Back-End/python-backend/requirements.txt \
            --target Back-End/python-backend/.python_packages/lib/site-packages

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: finance-backend-py
          publish-profile: ${{ secrets.AZURE_PYTHON_BACKEND_PUBLISH_PROFILE }}
          package: Back-End/python-backend
