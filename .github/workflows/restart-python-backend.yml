name: Daily Backend Restart

on:
  schedule:
    - cron: '0 21 * * *'   # 每天台灣時間 05:00（UTC+8 = UTC 21:00）
  workflow_dispatch:         # 支援手動觸發

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Restart Azure Backend via Kudu API
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, subprocess, os, sys

          profile = os.environ["PUBLISH_PROFILE"]
          root = ET.fromstring(profile)
          user = pwd = scm_host = None
          for p in root.findall("publishProfile"):
              if p.get("publishMethod") == "MSDeploy":
                  user     = p.get("userName")
                  pwd      = p.get("userPWD")
                  # publishUrl 格式：hostname:443，取 hostname 部分
                  scm_host = p.get("publishUrl", "").split(":")[0]
                  break
          if not user or not scm_host:
              print("ERROR: Cannot find MSDeploy credentials in publish profile")
              sys.exit(1)

          import json, base64
          url = f"https://{scm_host}/api/command"
          cred = base64.b64encode(f"{user}:{pwd}".encode()).decode()
          body = json.dumps({"command": "pkill -f uvicorn; sleep 2; echo done", "dir": "/home/site/wwwroot"})

          print(f"Calling: POST {url}")
          r = subprocess.run(
              ["curl", "-s", "-w", "\n%{http_code}",
               "-X", "POST", url,
               "-H", "Content-Type: application/json",
               "-H", f"Authorization: Basic {cred}",
               "-d", body],
              capture_output=True, text=True
          )
          lines = r.stdout.strip().split("\n")
          code  = lines[-1]
          body_out = "\n".join(lines[:-1])
          print(f"Kudu API response: HTTP {code}")
          print(body_out)
          if code not in ("200", "204"):
              print(f"stderr: {r.stderr}")
              sys.exit(1)
          EOF
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_PYTHON_BACKEND_PUBLISH_PROFILE }}

      - name: Log restart time
        run: echo "Backend restarted at $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S %Z')"
