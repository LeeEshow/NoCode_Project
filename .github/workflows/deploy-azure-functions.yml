name: Deploy Azure Functions (NDC Scraper)

on:
  push:
    branches: [main]
    paths:
      - 'azure-functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deployment ZIP
        run: |
          cd azure-functions
          zip -r ../deploy.zip function_app.py host.json requirements.txt .gitignore

      - name: Deploy to Azure Functions via Kudu
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          USERNAME=$(echo "$PUBLISH_PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASSWORD=$(echo "$PUBLISH_PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)

          echo "Deploying to fintarck-scraper..."

          HTTP_STATUS=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -X POST \
            "https://fintarck-scraper.scm.azurewebsites.net/api/zipdeploy?SCM_DO_BUILD_DURING_DEPLOYMENT=true" \
            -u "${USERNAME}:${PASSWORD}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip)

          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/resp.txt

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Deployment successful!"
          else
            echo "Deployment failed!"
            exit 1
          fi
