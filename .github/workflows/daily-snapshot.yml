name: Daily Snapshot

on:
  schedule:
    - cron: '0 6 * * *'     # 14:00 台灣時間（UTC+8）= 06:00 UTC，每日
  workflow_dispatch:          # 支援手動觸發（測試用）

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily snapshot
        run: |
          curl -X POST \
            "${{ secrets.BACKEND_URL }}/api/v1/snapshots/record" \
            -H "Content-Type: application/json" \
            -H "X-Cron-Token: ${{ secrets.CRON_SECRET }}" \
            --fail \
            --silent \
            --show-error
          echo "Snapshot triggered at $(date '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Trigger FinMind sync（基本面 + 三大法人）
        run: |
          curl -X POST \
            "${{ secrets.BACKEND_URL }}/api/v1/finmind/sync" \
            -H "Content-Type: application/json" \
            -H "X-Cron-Token: ${{ secrets.CRON_SECRET }}" \
            --fail \
            --silent \
            --show-error
          echo "FinMind sync triggered at $(date '+%Y-%m-%d %H:%M:%S UTC')"
