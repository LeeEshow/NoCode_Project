name: Deploy Python Shioaji API

on:
  push:
    branches: [main]
    paths:
      - 'Back-End/Shioaji_API/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies to .python_packages
        working-directory: Back-End/Shioaji_API
        run: |
          pip install -r requirements.txt \
            --target=".python_packages/lib/site-packages" \
            --upgrade

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: finance-shioaji
          publish-profile: ${{ secrets.AZURE_SHIOAJI_PUBLISH_PROFILE }}
          package: Back-End/Shioaji_API
